<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Email Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="verify-email.css">
</head>
<body>

    <div class="container" id="verify-email-container">
        <div class="verify-email-message-container">
            <p id="verify-email-message"></p>
        </div>
        <h2>Verify Your Email</h2>
        <p id="verify-email-label"></p>
        <form class="verify-email-form">
            <input type="tel" id="verification-code-input" placeholder="Enter Code" maxlength="6" required>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
        <div style="margin-top: 50px;">
            <p>Didn't get the code?</p>
            <button class="resend-btn">Resend Code</button>
        </div>
    </div>


    <div class="container" id="verified-login-container" style="display: none;">
        <span>You are verified ✅</span>
        <button class="verified-login-btn"><big><b>OK</b></big></button>
    </div>

    <script src="verify-email.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Dashboard</title>
    <link rel="stylesheet" href="inquiry.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/logo.png" alt="TutorLinc logo">
                <h1 class="site-name">TutorLinc</h1>
            </div>
            <ul class="nav-links">
                <li><a href="overview.html">Overview</a></li>
                <li><a href="subject.html">Subject</a></li>
                <li><a href="" class="active">Student inquiry</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="logout.html" class="logout">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="menu-toggle-container">
                <button class="menu-toggle">☰</button> <!-- Hamburger Menu -->
                <hr>
            </div>

            <header class="main-header">
                <h1>Manage Inquiries</h1>
            </header>

            <section class="inquiry-section">
                <table class="inquiry-table">
                    <thead>
                        <tr>
                            <th>Student name</th>
                            <th>Message</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td>I am interested in Elective ICT tutoring.</td>
                            <td>
                                <button class="btn" id="btn-delete">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Jane Doe</td>
                            <td>I am interested in Chemistry tutoring.</td>
                            <td>
                                <button class="btn" id="btn-delete">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="inquiry.js"></script>
</body>
</html>

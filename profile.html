<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profile Dashboard</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/logo.png" alt="TutorLinc logo">
                <h1 class="site-name">TutorLinc</h1>
            </div>
            <ul class="nav-links">
                <li><a href="overview.html">Overview</a></li>
                <li><a href="subject.html">Subject</a></li>
                <li><a href="inquiry.html">Student inquiry</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
                <li><a href="logout.html" class="logout">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="menu-toggle-container">
                <button class="menu-toggle">☰</button> <!-- Hamburger Menu -->
                <hr>
            </div>

            <header class="main-header">
                <h1>Profile Information</h1>
            </header>
            
            <div class="profile-photo">
                <span id="profile-name"></span>
                <img src="" alt="Profile Photo" class="profile-image">
                <input type="file" id="profile-image-input" style="display: none;">
                <button id="upload-button">Edit</button>
            </div>

            <!-- Modal for Image Preview -->
        <div id="image-preview-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Preview Profile Picture</h3>
                <img id="image-preview" src="" alt="Image Preview" class="preview-image">
                <div class="modal-actions">
                    <button id="save-button" class="btn-save">Save</button>
                    <button id="cancel-button" class="btn-cancel">Cancel</button>
                </div>
            </div>
        </div>

            <div class="location-link">
                <a href="address.html" style="text-decoration: none; border-radius: 3px; color: black; padding: 0 5px; box-shadow: 0px 0px 5px 2px rgba(0, 0, 0, 0.281);">Location</a>
            </div>
            
            <a href="edit-profile.html" style="text-decoration: none;"><button class="edit-profile-btn">Edit Profile</button></a>

            <section class="profile">
                <form id="profile-form">
                    <label for="first-name">First name</label>
                    <input type="text" id="first-name" name="first-name" readonly>

                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name" readonly>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" readonly title="can't change email here">

                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone" readonly>

                    <label for="qualification">Highest qualification</label>
                    <input type="text" id="qualification" name="qualification" readonly>

                    <label for="bio">Bio</label>
                    <textarea name="bio" id="bio" readonly></textarea>
                </form>
            </section>
        </main>
    </div>

    <script src="profile.js"></script>
</body>
</html>
